<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Payment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary d-flex justify-content-center align-items-center vh-100">

    <div class="card w-50">
        <div class="card-header">
            <strong>Payment form</strong>
        </div>

        <div class="card-body">

            <div class="alert alert-danger py-2">
                Some fields are missing
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Card #</label>
                    <input type="text" class="form-control" placeholder="XXXXXXXXXXXXXXXX">
                </div>

                <div class="col-md-3">
                    <label class="form-label">CVC #</label>
                    <input type="text" class="form-control" placeholder="0000">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Amount</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="text" class="form-control" placeholder="Amount">
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">State</label>
                    <select class="form-select">
                        <option selected>Pick a state</option>
                        <option>Madrid</option>
                        <option>Cantabria</option>
                        <option>PaíCs Vasco</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Postal Code</label>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">We accept:</label><br>
                    <div class="btn-group">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="Visa" id="Visa"
                                value="option1">
                            <label class="form-check-label" for="Visa">Visa</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="MasterCard" id="MasterCard"
                                value="option2">
                            <label class="form-check-label" for="MasterCard">MasterCard</label>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="3" placeholder="Add any notes here."></textarea>
                </div>
            </div>

        </div>

        <div class="card-footer d-flex justify-content-end">
            <button class="btn btn-secondary me-2">Cancel</button>
            <button class="btn btn-primary">Send</button>
        </div>
    </div>

</body>

</html>
